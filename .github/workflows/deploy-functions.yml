name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy ai-chat      --project-ref bzhqrvnkowzxriegwrvp
          supabase functions deploy ai-report    --project-ref bzhqrvnkowzxriegwrvp
          supabase functions deploy ai-questions --project-ref bzhqrvnkowzxriegwrvp
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
